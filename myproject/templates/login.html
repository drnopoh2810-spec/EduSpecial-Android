<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول - EduSpecial</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --accent: #2563eb; --accent-h: #1d4ed8;
      --text: #e6edf3; --text-muted: #8b949e;
      --error: #ef4444; --success: #22c55e;
    }
    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 1.5rem;
      background-image: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(37,99,235,.18) 0%, transparent 70%);
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px;
      box-shadow: 0 24px 60px rgba(0,0,0,.5);
    }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
      border-radius: 14px; display: inline-flex; align-items: center;
      justify-content: center; font-size: 1.75rem; margin-bottom: .75rem;
      box-shadow: 0 8px 24px rgba(37,99,235,.4);
    }
    .logo h1 { font-size: 1.4rem; font-weight: 700; }
    .logo p  { font-size: .85rem; color: var(--text-muted); margin-top: .25rem; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: .85rem; font-weight: 500; color: var(--text-muted); margin-bottom: .45rem; }
    input {
      width: 100%; padding: .7rem 1rem;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: inherit; font-size: .95rem;
      transition: border-color .2s; outline: none;
      direction: ltr; text-align: right;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
    input::placeholder { color: var(--text-muted); }
    .btn {
      width: 100%; padding: .8rem;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      font-family: inherit; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background .2s; margin-top: .5rem;
    }
    .btn:hover    { background: var(--accent-h); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .alert {
      padding: .75rem 1rem; border-radius: 8px;
      font-size: .875rem; margin-bottom: 1rem; display: none;
    }
    .alert.error   { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; display: block; }
    .alert.success { background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.3); color: #86efac; display: block; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-left: .4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🎓</div>
    <h1>EduSpecial</h1>
    <p>نظام إدارة المحتوى التعليمي</p>
  </div>

  <div id="alert" class="alert"></div>

  <div class="form-group">
    <label for="email">البريد الإلكتروني</label>
    <input type="email" id="email" placeholder="admin@example.com" autocomplete="email" />
  </div>
  <div class="form-group">
    <label for="password">كلمة المرور</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
  </div>
  <button class="btn" id="loginBtn" onclick="handleLogin()">تسجيل الدخول</button>
</div>

<script>
  function showAlert(msg, type = 'error') {
    const el = document.getElementById('alert');
    el.className = `alert ${type}`;
    el.textContent = msg;
  }

  async function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');

    if (!email || !password) { showAlert('يرجى تعبئة جميع الحقول'); return; }

    btn.disabled = true;
    btn.innerHTML = 'جاري التحقق <span class="spinner"></span>';

    try {
      const res  = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (data.success) {
        showAlert('تم التحقق! جاري التحويل...', 'success');
        setTimeout(() => { window.location.href = '/admin'; }, 800);
      } else {
        showAlert(data.error || 'بيانات الدخول غير صحيحة');
      }
    } catch (err) {
      showAlert('خطأ في الاتصال بالخادم');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'تسجيل الدخول';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
