name: 🐛 Bug Report
description: Report a bug in EduSpecial
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: android-version
    attributes:
      label: Android Version
      options:
        - Android 8.0 (API 26)
        - Android 9 (API 28)
        - Android 10 (API 29)
        - Android 11 (API 30)
        - Android 12 (API 31-32)
        - Android 13 (API 33)
        - Android 14 (API 34)
        - Android 15 (API 35)
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App Version
      placeholder: e.g. 1.2.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logcat / Stack Trace
      description: Paste any relevant logs here
      render: shell
