name: ✨ Feature Request
description: Suggest a new feature for EduSpecial
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve?
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions you've considered?

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      options:
        - Flashcards / SRS
        - Q&A Forum
        - Search
        - Offline / Sync
        - Media (Video/Audio)
        - UI / UX
        - Performance
        - Other
    validations:
      required: true
