version: 2
updates:
  # ── Gradle / Android dependencies ──────────────────────────────────────────
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "android"
    commit-message:
      prefix: "build(deps)"
    groups:
      compose:
        patterns:
          - "androidx.compose.*"
      hilt:
        patterns:
          - "com.google.dagger*"
          - "androidx.hilt*"
      firebase:
        patterns:
          - "com.google.firebase*"
      media3:
        patterns:
          - "androidx.media3*"

  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(deps)"
