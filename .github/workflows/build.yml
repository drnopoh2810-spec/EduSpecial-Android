name: Build & Auto Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── Build + Auto Release on every push to main ───────────────────────────
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    # Only create a release on push to main (not on PRs)
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed to count all commits for version number

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ─── Verify Firebase Configuration ────────────────────────────────────────
      - name: Verify Firebase Configuration
        run: |
          echo "🔍 Checking Firebase configuration..."
          echo ""
          
          # Check if google-services.json exists
          if [ -f "app/google-services.json" ]; then
            echo "✅ Firebase google-services.json is present"
            
            # Extract project info for verification
            PROJECT_ID=$(grep -o '"project_id": "[^"]*"' app/google-services.json | cut -d'"' -f4)
            STORAGE_BUCKET=$(grep -o '"storage_bucket": "[^"]*"' app/google-services.json | cut -d'"' -f4)
            
            echo "✅ Project ID: $PROJECT_ID"
            echo "✅ Storage Bucket: $STORAGE_BUCKET"
            echo ""
            echo "🎯 Configuration Source: Firebase Remote Config"
            echo "   - All API keys and secrets are managed in Firebase Console"
            echo "   - No GitHub Secrets needed (except for google-services.json)"
            echo "   - Cloudinary accounts configured in Remote Config"
            echo "   - Algolia keys configured in Remote Config"
            echo ""
            echo "🎉 Build ready! All configuration will be fetched from Firebase."
          else
            echo "❌ BUILD FAILED: google-services.json is missing!"
            echo ""
            echo "This file should be committed to the repository."
            echo "If it's missing, download it from Firebase Console:"
            echo "https://console.firebase.google.com/project/$PROJECT_ID/settings/general"
            exit 1
          fi

      - name: Create minimal local.properties
        run: |
          echo "📝 Creating minimal local.properties..."
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "✅ local.properties created (SDK path only)"
          echo ""
          echo "ℹ️  Note: All API keys now come from Firebase Remote Config"

      # Auto-generate version: 1.0.<commit_count>
      # Every push to main increments the patch number automatically
      - name: Generate version number
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="1.0.${COMMIT_COUNT}"
          TAG="v${VERSION}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "TAG=${TAG}"         >> $GITHUB_OUTPUT
          echo "Auto version: ${TAG}"

      # Update versionName and versionCode in build.gradle.kts
      - name: Update version in build.gradle.kts
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="1.0.${COMMIT_COUNT}"
          
          # Update versionCode
          sed -i "s/versionCode = [0-9]*/versionCode = ${COMMIT_COUNT}/" app/build.gradle.kts
          
          # Update versionName
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"${VERSION}\"/" app/build.gradle.kts
          
          echo "✅ Updated to version ${VERSION} (code: ${COMMIT_COUNT})"
          
          # Verify changes
          grep "versionCode" app/build.gradle.kts
          grep "versionName" app/build.gradle.kts

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK with version
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/EduSpecial-${{ steps.version.outputs.TAG }}.apk

      # Skip release creation on pull requests
      - name: Create GitHub Release & upload APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "EduSpecial ${{ steps.version.outputs.TAG }}"
          body: |
            ## EduSpecial ${{ steps.version.outputs.TAG }}

            **Commit:** ${{ github.sha }}
            **Branch:** main
            **Build:** #${{ github.run_number }}
            **Configuration:** Firebase Remote Config

            ### المميزات الجديدة
            - 🔧 **إدارة المفاتيح من Firebase**: جميع مفاتيح Cloudinary و Algolia تُدار من Firebase Remote Config
            - 🚀 **بناء مبسط**: لا حاجة لـ GitHub Secrets عدا google-services.json
            - 🔄 **تحديث فوري**: يمكن تحديث المفاتيح من Firebase Console بدون إعادة نشر

            ### التثبيت
            1. حمّل ملف `EduSpecial-${{ steps.version.outputs.TAG }}.apk`
            2. افتح الملف على جهازك وثبّت التطبيق

            > إذا ظهرت رسالة "تثبيت من مصادر غير معروفة"، اسمح بالتثبيت من الإعدادات.
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/EduSpecial-${{ steps.version.outputs.TAG }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
