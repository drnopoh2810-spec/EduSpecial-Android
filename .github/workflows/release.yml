name: Android Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type when set_version is empty"
        type: choice
        options: [patch, minor, major]
        default: patch
      set_version:
        description: "Explicit semantic version X.Y.Z (optional)"
        required: false
        type: string
      prerelease:
        description: "Mark GitHub release as pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    # Avoid infinite loop when this workflow itself pushes version bump commit.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Sync with latest main
        shell: bash
        run: |
          set -euo pipefail
          git pull --rebase origin main

      - name: Bump Android version
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.set_version || '' }}" ]]; then
            python3 scripts/bump_android_version.py --set-version "${{ github.event.inputs.set_version }}"
          else
            BUMP_TYPE="${{ github.event.inputs.bump || 'patch' }}"
            python3 scripts/bump_android_version.py --bump "$BUMP_TYPE"
          fi > version.env
          cat version.env
          cat version.env >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          if git diff --cached --quiet; then
            echo "No version changes detected after bump script."
            exit 0
          fi
          git commit -m "chore(release): bump app version to v${{ steps.bump.outputs.version_name }}"
          git push origin HEAD:main

      - name: Validate runtime config security
        run: python3 scripts/validate_config_security.py

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Create git tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${{ steps.bump.outputs.version_name }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version_name }}
          name: EduSpecial v${{ steps.bump.outputs.version_name }}
          prerelease: ${{ github.event.inputs.prerelease || false }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk

