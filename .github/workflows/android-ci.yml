name: Android CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-test-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate runtime config security
        run: python3 scripts/validate_config_security.py

      - name: Android lint
        run: ./gradlew lintDebug --stacktrace

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Verify release APK signature
        run: |
          if [ -f scripts/verify_release_signature.sh ]; then
            bash scripts/verify_release_signature.sh
          else
            echo "Skipping signature verification: script not found"
          fi

      - name: Upload lint and test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: android-reports-${{ github.run_id }}
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: warn

      - name: Upload APK artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: android-apks-${{ github.run_id }}
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: SonarQube scan
        if: ${{ env.HAS_SONAR == 'true' }}
        env:
          HAS_SONAR: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          ./gradlew sonar \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.login="$SONAR_TOKEN"

      - name: Notify success
        if: ${{ success() && secrets.SLACK_WEBHOOK_URL != '' }}
        run: |
          curl -X POST -H "Content-type: application/json" \
            --data "{\"text\":\"✅ Android CI passed for ${GITHUB_REPOSITORY} on ${GITHUB_REF_NAME}.\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Notify failure
        if: ${{ failure() && secrets.SLACK_WEBHOOK_URL != '' }}
        run: |
          curl -X POST -H "Content-type: application/json" \
            --data "{\"text\":\"❌ Android CI failed for ${GITHUB_REPOSITORY} on ${GITHUB_REF_NAME}. Check workflow run logs.\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"
